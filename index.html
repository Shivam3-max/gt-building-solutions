<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Building Solutions — All Building Solutions Under One Roof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF8F3;
  --cream2:#F3EFE4;
  --navy:#0D1B3E;
  --navy2:#162347;
  --navy3:#1E2F5A;
  --gold:#C9A84C;
  --gold2:#DDB84A;
  --gold3:#F0D078;
  --gold-pale:#F7EDD0;
  --white:#FFFFFF;
  --txt:#0D1B3E;
  --txt2:#4A5070;
  --txt3:#8890AA;
  --border:rgba(201,168,76,0.18);
  --px:80px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes marqueeL{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes marqueeR{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes pulse{0%,100%{box-shadow:0 6px 28px rgba(37,211,102,0.38)}50%{box-shadow:0 6px 44px rgba(37,211,102,0.65)}}
@keyframes scrollDot{0%{transform:translateY(-100%)}100%{transform:translateY(200%)}}
@keyframes mobileMenuIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.marqueeL{animation:marqueeL 38s linear infinite}
.marqueeR{animation:marqueeR 44s linear infinite}

.card-hover{transition:transform 0.28s ease,box-shadow 0.28s ease,border-color 0.28s ease}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 24px 56px rgba(13,27,62,0.10);border-color:var(--gold) !important}

.btn-gold{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);
  color:var(--navy);border:none;border-radius:6px;
  padding:14px 36px;font-size:12px;font-weight:600;
  font-family:'DM Sans',sans-serif;letter-spacing:1.4px;
  text-transform:uppercase;cursor:pointer;
  box-shadow:0 6px 24px rgba(201,168,76,0.32);
  text-decoration:none;
  transition:all 0.25s;
}
.btn-gold:hover{box-shadow:0 10px 36px rgba(201,168,76,0.48);transform:translateY(-2px)}

.btn-ghost{
  display:inline-flex;align-items:center;gap:10px;
  background:transparent;color:#ffffff;
  border:1px solid rgba(255,255,255,0.28);border-radius:6px;
  padding:14px 36px;font-size:12px;font-weight:500;
  font-family:'DM Sans',sans-serif;letter-spacing:1.4px;
  text-transform:uppercase;cursor:pointer;
  text-decoration:none;
  transition:all 0.25s;
}
.btn-ghost:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.5)}

.section-tag{
  font-size:10px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:16px;display:block;
}
.section-h{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(30px,4.5vw,58px);
  font-weight:600;color:var(--navy);line-height:1.1;
}
.section-h-light{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(30px,4.5vw,58px);
  font-weight:400;font-style:italic;color:#ffffff;line-height:1.1;
}
.gold-text{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 60%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
input,select,textarea{
  width:100%;padding:13px 16px;
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--navy);background:var(--white);outline:none;
  transition:border-color 0.2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}

/* ── GRID UTILITIES ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}

/* ── PADDING UTILITIES ── */
.pad-x{padding-left:var(--px);padding-right:var(--px)}
.pad-section{padding:80px var(--px)}
.pad-section-sm{padding:40px var(--px)}

/* ── TABLET (max 1100px) ── */
@media(max-width:1100px){
  :root{--px:40px}
  .grid-4{grid-template-columns:repeat(2,1fr)!important}
  .grid-5{grid-template-columns:repeat(3,1fr)!important}
}

/* ── MOBILE (max 768px) ── */
@media(max-width:768px){
  :root{--px:20px}
  .hide-mobile{display:none!important}
  .show-mobile{display:flex!important}
  .grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr!important}
  .grid-2-mob{grid-template-columns:1fr 1fr!important}
  .pad-section{padding:56px var(--px)!important}
  .pad-section-sm{padding:32px var(--px)!important}
  .btn-gold,.btn-ghost{padding:13px 24px!important;font-size:11px!important}
  .section-h,.section-h-light{font-size:clamp(26px,7vw,40px)!important}
  .span2-mobile{grid-column:span 1!important}
  .mob-center{text-align:center!important}
  .mob-stack{flex-direction:column!important}
  .mob-full{width:100%!important}
  .mob-hide{display:none!important}
}

/* ── SMALL MOBILE (max 480px) ── */
@media(max-width:480px){
  :root{--px:16px}
  .grid-2-mob{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
